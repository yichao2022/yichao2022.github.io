<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equity & Policy Impact | Yichao Jin, PhD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- DOMPurify for security -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

    <!-- Highlight.js for code blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- 1. MathJax Engine (For LaTeX) -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true
        },
        options: {
          ignoreHtmlClass: 'tex2jax_ignore',
          processHtmlClass: 'tex2jax_process'
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- 2. Mermaid Engine (For Diagrams) -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
      mermaid.initialize({ 
        startOnLoad: true, 
        theme: 'neutral',
        securityLevel: 'loose',
        sankey: {
          nodeWidth: 15,
          nodeSpacing: 50,
          leftMargin: 10,
          rightMargin: 10,
          width: 900
        }
      });
    </script>

    <!-- Tailwind Typography -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap');
        body { background-color: #f8fafc; }
        
        /* Fix for Mermaid Sankey label overlapping */
        .mermaid {
            width: 100%;
            overflow-x: auto;
            background: white;
            border-radius: 8px;
            padding: 10px;
        }
        .mermaid svg {
            max-width: none !important; /* Allow it to be wider than container if needed */
        }
        .mermaid .node text {
            font-family: 'Inter', sans-serif !important;
            font-size: 11px !important;
            text-shadow: 0 0 3px white;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700 antialiased font-serif">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center font-sans">
            <a href="/" class="text-xl font-bold text-slate-800 hover:text-teal-700 transition-colors">Yichao Jin, PhD</a>
            <a href="/" class="text-sm font-medium text-slate-500 hover:text-teal-600 transition-colors"><i class="fas fa-arrow-left mr-2"></i>Back to Home</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-12">
        <!-- Open Source Header Banner -->
        <div class="mb-8 flex flex-col sm:flex-row sm:items-center sm:justify-between bg-white p-6 rounded-xl shadow-sm border border-slate-100 font-sans">
            <div>
                <h2 class="text-lg font-semibold text-slate-800">Equity & Policy Impact</h2>
                <p class="text-sm text-slate-500 mt-1">Open Research & Data-Driven Policy Design</p>
            </div>
            <a href="https://github.com/yichao2022/yichao2022.github.io/tree/main/equity" target="_blank" class="mt-4 sm:mt-0 inline-flex items-center px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white text-sm font-medium rounded-lg transition-colors shadow-sm">
                <i class="fab fa-github mr-2"></i>
                Open Source on GitHub
            </a>
        </div>

        <div class="bg-white p-8 md:p-12 rounded-xl shadow-sm border border-slate-100">
            <div id="content" class="prose prose-slate prose-lg max-w-none prose-headings:font-sans prose-a:text-teal-600 hover:prose-a:text-teal-700"></div>
        </div>

        <!-- Open Source Footer Banner -->
        <div class="mt-8 text-center font-sans">
            <a href="https://github.com/yichao2022/yichao2022.github.io/tree/main/equity" target="_blank" class="inline-flex items-center px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:text-slate-900 hover:bg-slate-50 rounded-lg transition-colors text-sm font-medium shadow-sm">
                <i class="fab fa-github mr-2"></i>
                View Page Source Code
            </a>
        </div>
    </main>

    <script>
        async function renderContent() {
            try {
                // Add cache-busting parameter
                const cacheBuster = new Date().getTime();
                const response = await fetch('./index.md?v=' + cacheBuster);
                if (!response.ok) throw new Error('Markdown file not found');
                
                let markdown = await response.text();
                
                // Strip frontmatter if present
                markdown = markdown.replace(/^---[\s\S]*?---\n/, '');

                // Setup marked to handle code blocks
                marked.setOptions({
                    highlight: function(code, lang) {
                        if (lang && hljs.getLanguage(lang)) {
                            return hljs.highlight(code, { language: lang }).value;
                        }
                        return hljs.highlightAuto(code).value;
                    }
                });

                const rawHtml = marked.parse(markdown);
                document.getElementById('content').innerHTML = rawHtml;

                // 3. Class Targeting: Convert pre code.language-mermaid to div.mermaid
                document.querySelectorAll('pre code.language-mermaid').forEach((el) => {
                  const div = document.createElement('div');
                  div.className = 'mermaid';
                  div.textContent = el.textContent;
                  el.parentNode.replaceWith(div);
                });
                
                // Render Mermaid
                if (window.mermaid) {
                    await mermaid.run({
                        nodes: document.querySelectorAll('.mermaid')
                    });
                }

                // Render MathJax
                if (window.MathJax && window.MathJax.typesetPromise) {
                    MathJax.typesetPromise();
                }

            } catch (error) {
                console.error('Error rendering content:', error);
                document.getElementById('content').innerHTML = '<p class="text-red-500">Error loading content.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', renderContent);
    </script>
</body>
</html>
