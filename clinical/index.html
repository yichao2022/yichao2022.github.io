<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinical Simulation | Yichao Jin, Ph.D.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- DOMPurify for security -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

    <!-- Highlight.js for code blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- MathJax for LaTeX -->
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']],
          processEscapes: true
        },
        svg: {
          fontCache: 'global'
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Tailwind Typography -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap');
        body { background-color: #f8fafc; }
        .mermaid-container {
            width: 100%;
            overflow-x: auto;
            margin: 2rem 0;
        }
        .mermaid {
            width: 100% !important;
            max-width: 1000px !important;
            margin: 0 auto !important;
            background-color: #f9f9f9;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .mermaid svg {
            max-width: 100% !important;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-700 antialiased font-serif">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center font-sans">
            <a href="/" class="text-xl font-bold text-slate-800 hover:text-teal-700 transition-colors">Yichao Jin, Ph.D.</a>
            <a href="/" class="text-sm font-medium text-slate-500 hover:text-teal-600 transition-colors"><i class="fas fa-arrow-left mr-2"></i>Back to Home</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-12">
        <div class="bg-white p-8 md:p-12 rounded-xl shadow-sm border border-slate-100">
            <div id="content" class="prose prose-slate prose-lg max-w-none prose-headings:font-sans prose-a:text-teal-600 hover:prose-a:text-teal-700"></div>
        </div>
    </main>

    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        
        mermaid.initialize({ 
            startOnLoad: false,
            theme: 'default',
            fontFamily: 'Inter'
        });

        async function renderContent() {
            try {
                // Add cache-busting parameter
                const cacheBuster = new Date().getTime();
                const response = await fetch('./index.md?v=' + cacheBuster);
                if (!response.ok) throw new Error('Markdown file not found');
                
                let markdown = await response.text();
                
                // Strip frontmatter if present
                markdown = markdown.replace(/^---[\s\S]*?---\s*/, '');

                // Setup marked with mermaid support
                marked.use({
                    highlight(code, lang) {
                        if (lang === 'mermaid') return code;
                        if (lang && hljs.getLanguage(lang)) {
                            return hljs.highlight(code, { language: lang }).value;
                        }
                        return hljs.highlightAuto(code).value;
                    },
                    renderer: {
                        code(code, lang) {
                            if (lang === 'mermaid') {
                                return `<div class="mermaid flex justify-center my-8">${code}</div>`;
                            }
                            return false; // Use default renderer
                        }
                    }
                });

                const rawHtml = marked.parse(markdown);
                
                document.getElementById('content').innerHTML = rawHtml;
                
                // Render Mermaid
                await mermaid.run({
                    nodes: document.querySelectorAll('.mermaid')
                });

                // Render MathJax
                if (window.MathJax) {
                    MathJax.typesetPromise();
                }

            } catch (error) {
                console.error('Error rendering content:', error);
                document.getElementById('content').innerHTML = `
                    <div class="text-red-500 p-4 border border-red-200 rounded-lg bg-red-50">
                        <p class="font-bold">Error loading content:</p>
                        <p class="text-sm">${error.message}</p>
                    </div>
                `;
            }
        }

        renderContent();
    </script>
</body>
</html>
